<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigma Studios App</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/componentes.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

    <div id="view-canciones" class="view active">
        <div class="header">
            <h1>Canciones</h1>
            <button class="btn-add" onclick="abrirModalCancion()"><span class="material-icons">add</span> Add</button>
        </div>
        <div class="search-container">
            <span class="material-icons search-icon">search</span>
            <input type="text" id="search-songs" placeholder="Buscar canción, artista...">
        </div>
        <div class="filter-chips">
            <select id="filter-estado-cancion" class="chip-select" onchange="aplicarFiltrosCanciones()">
                <option value="">Estado: Todos</option>
                <option value="Lista">Lista</option>
                <option value="Por Ensayar">Por Ensayar</option>
                <option value="Sin Confirmar">Sin Confirmar</option>
            </select>
            <select id="sort-ensayo-cancion" class="chip-select" onchange="aplicarFiltrosCanciones()">
                <option value="menos-reciente">Orden: Más tiempo sin ensayar</option>
                <option value="mas-reciente">Orden: Ensayadas recientemente</option>
            </select>
        </div>
        <div class="list-container" id="lista-canciones"></div>
    </div>

    <div id="view-detalle-cancion" class="view">
        <div class="header">
            <button class="btn-back" onclick="regresarACanciones()"><span class="material-icons">arrow_back</span> Volver</button>
            <div>
                <button class="btn-icon-action" onclick="editarCancionActual()"><span class="material-icons">edit</span></button>
                <button class="btn-delete-action" id="btn-eliminar-cancion-actual" style="display:inline-flex;"><span class="material-icons">delete</span></button>
            </div>
        </div>
        <div id="detalle-cancion-contenido"></div>
    </div>

    <div id="view-historial-ensayos" class="view">
        <div class="header">
            <button class="btn-back" onclick="regresarADetalleCancion()"><span class="material-icons">arrow_back</span> Volver</button>
        </div>
        <h2 style="margin-top:0;">Historial de Ensayos</h2>
        <div id="lista-historial-ensayos" class="list-container"></div>
    </div>

    <div id="view-miembros" class="view">
        <div class="header">
            <h1>Miembros</h1>
            <button class="btn-add" onclick="abrirModalMiembro()"><span class="material-icons">add</span> Add</button>
        </div>
        <div class="search-container">
            <span class="material-icons search-icon">search</span>
            <input type="text" id="search-miembros" placeholder="Buscar integrante...">
        </div>
        <div class="filter-chips">
            <select id="filter-inst-miembro" class="chip-select" onchange="aplicarFiltroMiembros()">
                <option value="">Instrumento: Todos</option>
            </select>
        </div>
        <div class="list-container" id="lista-miembros"></div>
    </div>

    <div id="view-detalle-miembro" class="view">
        <div class="header">
            <button class="btn-back" onclick="cambiarPestaña('miembros', 1)"><span class="material-icons">arrow_back</span> Volver</button>
            <div>
                <button class="btn-icon-action" onclick="editarMiembroActual()"><span class="material-icons">edit</span></button>
                <button class="btn-delete-action" id="btn-eliminar-miembro-actual" style="display:inline-flex;"><span class="material-icons">delete</span></button>
            </div>
        </div>
        <div id="detalle-miembro-contenido"></div>
    </div>

    <div id="view-sesiones" class="view">
        <div class="header">
            <h1>Sesiones</h1>
            <button class="btn-add" onclick="abrirModal('modal-sesion')"><span class="material-icons">add</span> Add</button>
        </div>
        <div class="list-container" id="lista-sesiones"></div>
    </div>

    <div id="modal-miembro" class="modal layer-400">
        <div class="modal-content b-sheet">
            <h3 id="titulo-modal-miembro">Nuevo Integrante</h3>
            <label class="input-label">Nombre del integrante</label>
            <input type="text" id="m-nombre" placeholder="Ej: Emilio">
            
            <label class="input-label">Selecciona sus Categorías (Instrumentos)</label>
            <div id="categorias-pills-container" class="pills-grid"></div>

            <div class="add-category-row">
                <input type="text" id="nueva-categoria-input" placeholder="Otra categoría...">
                <button type="button" class="btn-add-pill" onclick="crearNuevaCategoriaGlobal()"><span class="material-icons">add</span></button>
            </div>

            <label class="input-label">URL de la Foto (Opcional)</label>
            <input type="url" id="m-foto" placeholder="https://...">

            <div class="modal-buttons">
                <button class="btn-cancel" onclick="cerrarModal('modal-miembro')">Cancelar</button>
                <button class="btn-save" onclick="guardarMiembro()">Guardar</button>
            </div>
        </div>
    </div>

    <div id="modal-cancion" class="modal layer-200">
        <div id="cancion-paso-1" class="modal-content b-sheet step active">
            <h3 id="titulo-modal-cancion">Añadir Nueva Canción</h3>
            <input type="text" id="c-titulo" placeholder="Título de la canción">
            <input type="text" id="c-artista" placeholder="Artista de la canción">
            <input type="text" id="c-album" placeholder="Álbum (Opcional)">
            <input type="url" id="c-link" placeholder="Link de YouTube">
            
            <select id="c-estado">
                <option value="Sin Confirmar">Sin Confirmar</option>
                <option value="Por Ensayar" selected>Por Ensayar</option>
                <option value="Lista">Lista</option>
            </select>
            <textarea id="c-notas" placeholder="Notas importantes..."></textarea>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="cerrarModal('modal-cancion')">Cancelar</button>
                <button class="btn-save" onclick="irAPaso2()">Siguiente</button>
            </div>
        </div>

        <div id="cancion-paso-2" class="modal-content b-sheet step">
            <h3>Responsables e Instrumentos</h3>
            <div id="user-list-asignaciones" class="asignaciones-list"></div>
            <button class="btn-secondary" onclick="abrirSubModalSeleccion()"><span class="material-icons">person_add</span> Añadir Integrante</button>
            <div class="modal-buttons" style="margin-top:20px;">
                <button class="btn-cancel" onclick="irAPaso1()">Atrás</button>
                <button class="btn-save" onclick="finalizarGuardadoCancion()">Listo</button>
            </div>
        </div>
    </div>

    <div id="sub-modal-seleccion" class="modal layer-300">
        <div class="modal-content b-sheet full-height-mobile">
            <h3>Seleccionar Músico</h3>
            <div id="sub-lista-miembros-disponibles" class="sub-list-container tall-scroll"></div>
            
            <div id="bloque-seleccion-instrumento" style="display:none; margin-top:15px;">
                <label class="input-label">Categoría asignada para este tema:</label>
                <select id="sub-select-instrumento-musico"></select>
            </div>
            <div class="modal-buttons" style="margin-top:20px;">
                <button class="btn-cancel" onclick="cerrarSubModalSeleccion()">Cancelar</button>
                <button class="btn-secondary" onclick="abrirModalDesdeSub()"><span class="material-icons">person_add</span> Nuevo</button>
                <button class="btn-save" id="btn-confirmar-asignacion" disabled onclick="confirmarAsignacionResponsable()">Agregar</button>
            </div>
        </div>
    </div>

    <div id="modal-ensayo" class="modal layer-400">
        <div class="modal-content b-sheet">
            <h3>Registrar Ensayo</h3>
            <label class="input-label">Fecha del ensayo</label>
            <input type="date" id="e-fecha">
            <label class="input-label">Músicos que participaron</label>
            <div id="e-participantes-list" class="sub-list-container"></div>
            <div class="modal-buttons" style="margin-top:20px;">
                <button class="btn-cancel" onclick="cerrarModal('modal-ensayo')">Cancelar</button>
                <button class="btn-save" onclick="guardarEnsayoCancion()">Guardar</button>
            </div>
        </div>
    </div>

    <div id="modal-sesion" class="modal layer-200">
        <div class="modal-content b-sheet">
            <h3>Nueva Sesión</h3>
            <input type="text" id="s-fecha" placeholder="Fecha">
            <input type="text" id="s-descripcion" placeholder="Objetivo">
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="cerrarModal('modal-sesion')">Cancelar</button>
                <button class="btn-save" onclick="guardarSesion()">Guardar</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav" id="main-nav">
        <div class="nav-item active" onclick="cambiarPestaña('canciones', 0)">
            <span class="material-icons">play_arrow</span><span>Canciones</span>
        </div>
        <div class="nav-item" onclick="cambiarPestaña('miembros', 1)">
            <span class="material-icons">groups</span><span>Miembros</span>
        </div>
        <div class="nav-item" onclick="cambiarPestaña('sesiones', 2)">
            <span class="material-icons">calendar_today</span><span>Sesiones</span>
        </div>
    </nav>

    <script src="js/db.js"></script>
    <script src="js/miembros.js"></script>
    <script src="js/canciones.js"></script>
    <script src="js/sesiones.js"></script>
</body>
</html>
